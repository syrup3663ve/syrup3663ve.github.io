<body>
<div id="main"></div>
<script>
            // We can't use a module script here because we need to start the script immediately when streaming
            import("/./assets/dioxus/blog-app.js").then(
                ({ default: init }) => {
                init("/./assets/dioxus/blog-app_bg.wasm").then((wasm) => {
                    if (wasm.__wbindgen_start == undefined) {
                    wasm.main();
                    }
                });
                }
            );
            </script>
